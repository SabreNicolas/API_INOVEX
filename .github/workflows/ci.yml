# ===========================================
# GitHub Actions CI/CD - API Cahier de Soins
# ===========================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - preprod
      - "feat/**"
  pull_request:
    branches:
      - main
      - preprod

env:
  NODE_VERSION: "20.x"

jobs:
  # ----- Lint & Format Check -----
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 💅 Check Prettier formatting
        run: npm run format

      - name: 🔐 Security audit
        run: npm run audit

  # ----- Unit Tests -----
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🧪 Run unit tests with coverage
        run: npm run test -- --coverage --passWithNoTests

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ----- E2E Tests -----
  test-e2e:
    name: 🔬 E2E Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔬 Run E2E tests
        run: npm run test:e2e -- --passWithNoTests

  # ----- Build -----
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [test, test-e2e]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ----- Deploy to Production (only on main) -----
  deploy:
    name: 🚀 Deploy to Production
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏷️ Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE_TAG=$(date +%Y%m%d-%H%M%S)
          IMAGE_TAG="${DATE_TAG}-${SHORT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "📌 Image tag: ${IMAGE_TAG}"

      - name: 🐳 Build Docker image
        run: |
          docker build \
            --tag api-cahier-soins:${{ steps.tag.outputs.IMAGE_TAG }} \
            --tag api-cahier-soins:latest \
            .

      - name: 🔍 Verify Docker image
        run: docker images api-cahier-soins

      - name: ✅ Copy .env.prod from runner
        run: |
          for ENV_FILE in "/home/github-runner/.env.prod" "/home/github-runner/cahier-soins/action-runner-back/.env.prod" "$HOME/.env.prod"; do
            if [ -f "$ENV_FILE" ]; then
              cp "$ENV_FILE" .env.prod
              echo "✅ .env.prod copié depuis $ENV_FILE"
              exit 0
            fi
          done
          echo "❌ Fichier .env.prod introuvable !"
          echo "Placez-le dans /home/github-runner/.env.prod"
          exit 1

      - name: 🚀 Deploy with Docker Compose
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }} \
          docker compose -f docker-compose.prod.yml up -d --force-recreate

      - name: ⏳ Wait for health check
        run: |
          # Charger le PORT depuis .env.prod
          APP_PORT=$(grep -E '^PORT=' .env.prod | cut -d= -f2 || echo "3100")
          echo "Attente du démarrage de l'API sur le port ${APP_PORT}..."
          # D'abord attendre que l'API réponde via curl
          for i in $(seq 1 30); do
            if curl -skf https://localhost:${APP_PORT}/api/health > /dev/null 2>&1; then
              echo "✅ API répond après $((i*2))s"
              exit 0
            fi
            echo "  Tentative $i/30..."
            sleep 2
          done
          echo "❌ L'API n'a pas démarré correctement"
          echo "=== Docker status ==="
          docker ps -a --filter name=cahier_soins_api
          echo "=== Logs ==="
          docker logs cahier_soins_api --tail 50
          exit 1

      - name: 📋 List image history
        run: |
          echo "=== Historique des images ==="
          docker images api-cahier-soins --format "table {{.Tag}}\t{{.Size}}\t{{.CreatedAt}}" | head -20

      - name: 🧹 Cleanup old images (keep last 10)
        run: |
          echo "Nettoyage des anciennes images (garde les 10 dernières)..."
          docker images api-cahier-soins --format "{{.Tag}}" \
            | grep -v "latest" \
            | sort -r \
            | tail -n +11 \
            | xargs -r -I {} docker rmi api-cahier-soins:{} 2>/dev/null || true
          echo "✅ Nettoyage terminé"
