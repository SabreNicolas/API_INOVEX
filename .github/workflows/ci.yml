# ===========================================
# GitHub Actions CI/CD - API Cahier de Soins
# ===========================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - preprod
      - "feat/**"
  pull_request:
    branches:
      - main
      - preprod

env:
  NODE_VERSION: "20.x"

jobs:
  # ----- Lint & Format Check -----
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 💅 Check Prettier formatting
        run: npm run format

      - name: 🔐 Security audit
        run: npm run audit

  # ----- Unit Tests -----
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🧪 Run unit tests with coverage
        run: npm run test -- --coverage --passWithNoTests

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ----- E2E Tests -----
  test-e2e:
    name: 🔬 E2E Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔬 Run E2E tests
        run: npm run test:e2e -- --passWithNoTests

  # ----- Build -----
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [test, test-e2e]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
