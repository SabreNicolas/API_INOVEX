# ===========================================
# Docker Compose - Production
# API Cahier de Soins
# ===========================================
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Prérequis:
#   - Créer un fichier .env.prod avec les variables nécessaires
#     (voir .env.example pour référence)
# ===========================================

services:
  # ----- API NestJS -----
  api:
    image: api-cahier-soins:${IMAGE_TAG:-latest}
    container_name: cahier_soins_api
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "${PORT:-3100}:${PORT:-3100}"
    volumes:
      - uploads_data:/app/uploads
      - /home/github-runner/cert.cer:/app/certs/cert.cer:ro
      - /home/github-runner/cert.key:/app/certs/cert.key:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--no-check-certificate", "--spider", "https://localhost:${PORT:-3100}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cahier_network

volumes:
  uploads_data:
    name: cahier_soins_uploads

networks:
  cahier_network:
    name: cahier_soins_prod_network
